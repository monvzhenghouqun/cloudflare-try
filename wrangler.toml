# Wrangler 配置模板（用于使用 Wrangler CLI 发布到 Pages）
# 请根据你的 Cloudflare 账号信息替换下列占位符后再使用。

# 项目名（用于 pages publish 时的 --project-name）
project_name = "cloudflare-try"

# 你的 Cloudflare 账户 ID（可在 Cloudflare 仪表盘 Account -> Overview 找到）
# account_id = "YOUR_ACCOUNT_ID"

# 兼容日期（请设置为今天或你的首选日期）
compatibility_date = "2026-07-14"

# 如果你使用 Pages 作为静态站托管，通常不需要配置 Workers 的 site 字段。
# 若你希望使用 Workers Sites（旧方案），可参考下面注释（不推荐用于 Pages）：
# [site]
# bucket = "./"
# entry-point = "workers-site"

# 使用示例：
# wrangler pages publish . --project-name=cloudflare-try
# 或先创建项目： wrangler pages project create cloudflare-try
