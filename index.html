<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kaf</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;

        h1 { color: #f38020; } /* Cloudflare 橙色 */
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello Cloudflare!</h1>
        <p>这是我部署在 Cloudflare Pages 上的第一个静态网页。</p>

</html>
